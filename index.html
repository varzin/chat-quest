<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0612">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Chat Quest</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@0.475.0/dist/umd/lucide.min.js"></script>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar__header">
            <h2 class="sidebar__title" data-i18n="chats">Чаты</h2>
            <button class="sidebar__close" id="sidebar-close" aria-label="Close menu">
                <i data-lucide="x"></i>
            </button>
        </div>
        <div class="sidebar__list" id="scenario-list">
            <!-- Scenario items will be rendered here -->
        </div>
        <div class="sidebar__actions">
            <button class="sidebar__btn" id="btn-add-scenario">
                <i data-lucide="message-square-plus"></i>
                <span data-i18n="newChat">Новый чат</span>
            </button>
        </div>
        <div class="sidebar__footer">
            <button class="sidebar__btn sidebar__btn--settings" id="btn-settings">
                <i data-lucide="settings"></i>
                <span data-i18n="settings">Настройки</span>
            </button>
        </div>
    </aside>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main Chat Container -->
    <main class="chat">
        <!-- Chat Header -->
        <header class="chat__header">
            <button class="chat__menu-btn" id="btn-menu" aria-label="Open menu">
                <i data-lucide="menu"></i>
            </button>
            <div class="chat__header-info">
                <h1 class="chat__title" id="chat-title">Chat Quest</h1>
                <span class="chat__subtitle" id="chat-subtitle"></span>
            </div>
            <button class="chat__restart-btn" id="btn-restart" aria-label="Restart scenario">
                <i data-lucide="refresh-cw"></i>
            </button>
            <div class="chat__settings-wrap" id="chat-settings-wrap" hidden>
                <button class="chat__settings-btn" id="btn-chat-settings" aria-label="Chat settings">
                    <i data-lucide="ellipsis-vertical"></i>
                </button>
                <div class="chat__settings-menu" id="chat-settings-menu" hidden>
                    <button class="chat__settings-item" id="btn-change-model">
                        <i data-lucide="sparkles"></i>
                        <span data-i18n="changeModel">Сменить модель</span>
                    </button>
                    <button class="chat__settings-item" id="btn-edit-character">
                        <i data-lucide="user-pen"></i>
                        <span data-i18n="editChatCharacter">Редактировать персонажа</span>
                    </button>
                    <button class="chat__settings-item chat__settings-item--danger" id="btn-reset-chat">
                        <i data-lucide="refresh-cw"></i>
                        <span data-i18n="resetChat">Сбросить чат</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Messages Container -->
        <div class="chat__messages" id="messages">
            <!-- Messages will be rendered here -->
        </div>

        <!-- Scroll to Bottom -->
        <button class="chat__scroll-bottom" id="btn-scroll-bottom" aria-label="Scroll to bottom">
            <i data-lucide="chevron-down"></i>
        </button>

        <!-- Choices Panel -->
        <div class="chat__bottom-bar chat__choices" id="choices">
            <div class="chat__bottom-bar-content" id="choices-content">
                <!-- Choice buttons will be rendered here -->
            </div>
        </div>

        <!-- AI Chat Input -->
        <div class="chat__bottom-bar chat__input" id="chat-input" hidden>
            <div class="chat__bottom-bar-content chat__input-content">
                <button class="chat__format-btn" id="btn-format-asterisk" aria-label="Format with asterisks">
                    <i data-lucide="asterisk"></i>
                </button>
                <textarea class="chat__input-field" id="chat-input-field" data-i18n-placeholder="messagePlaceholder" placeholder="Сообщение..." rows="1"></textarea>
                <button class="chat__send-btn" id="btn-send" aria-label="Send">
                    <i data-lucide="send"></i>
                </button>
            </div>
        </div>

        <!-- Empty State -->
        <div class="chat__empty" id="empty-state" hidden>
            <p data-i18n="noScenario">Выберите сценарий из меню</p>
        </div>
    </main>

    <!-- Editor / New Chat Modal -->
    <div class="modal" id="editor-modal" hidden>
        <div class="modal__content">
            <div class="modal__header">
                <h2 class="modal__title" id="editor-title" data-i18n="newChat">Новый чат</h2>
                <div class="modal__header-actions">
                    <button class="modal__close" id="editor-close" aria-label="Close">
                        <i data-lucide="x"></i>
                    </button>
                </div>
            </div>

            <!-- Editor Tabs (shown when creating new) -->
            <div class="editor-tabs" id="editor-tabs">
                <button class="editor-tabs__btn is-active" data-tab="scenario">
                    <i data-lucide="book-open"></i>
                    <span data-i18n="tabScenario">Сценарий</span>
                </button>
                <button class="editor-tabs__btn" data-tab="ai-chat">
                    <i data-lucide="bot"></i>
                    <span data-i18n="tabAiChat">AI Чат</span>
                </button>
            </div>

            <!-- Tab: Scenario -->
            <div class="editor-tab-content is-active" id="editor-tab-scenario">
                <div class="editor-actions" id="editor-actions">
                    <button class="editor-actions__btn" id="editor-template" aria-label="Use template">
                        <i data-lucide="file-text"></i>
                        <span data-i18n="useTemplate">Шаблон</span>
                    </button>
                    <button class="editor-actions__btn" id="editor-paste" aria-label="Paste from clipboard">
                        <i data-lucide="clipboard-paste"></i>
                        <span data-i18n="paste">Вставить</span>
                    </button>
                    <button class="editor-actions__btn" id="editor-load-file" aria-label="Load file">
                        <i data-lucide="upload"></i>
                        <span data-i18n="loadFile">Загрузить</span>
                    </button>
                </div>
                <div class="modal__body">
                    <textarea class="modal__textarea" id="editor-textarea" placeholder="YAML + Ink код сценария..."></textarea>
                    <div class="modal__error" id="editor-error" hidden></div>
                </div>
                <div class="modal__footer">
                    <button class="modal__btn modal__btn--secondary" id="editor-cancel" data-i18n="cancel">Отмена</button>
                    <button class="modal__btn modal__btn--primary" id="editor-save" data-i18n="save">Сохранить</button>
                </div>
            </div>

            <!-- Tab: AI Chat -->
            <div class="editor-tab-content" id="editor-tab-ai-chat">
                <!-- Empty state: no API keys -->
                <div class="modal__body ai-chat-empty" id="ai-chat-no-keys" hidden>
                    <div class="ai-chat-empty__content">
                        <i data-lucide="key" class="ai-chat-empty__icon"></i>
                        <p class="ai-chat-empty__text" data-i18n="noApiKeys">API ключи не настроены</p>
                        <button class="modal__btn modal__btn--primary" id="ai-chat-fix-settings" data-i18n="fixInSettings">Настроить</button>
                    </div>
                </div>

                <!-- Empty state: no characters -->
                <div class="modal__body ai-chat-empty" id="ai-chat-no-chars" hidden>
                    <div class="ai-chat-empty__content">
                        <i data-lucide="users" class="ai-chat-empty__icon"></i>
                        <p class="ai-chat-empty__text" data-i18n="noCharactersHint">Создайте персонажа в настройках</p>
                        <button class="modal__btn modal__btn--primary" id="ai-chat-fix-chars" data-i18n="fixInSettings">Настроить</button>
                    </div>
                </div>

                <!-- Normal state: config form -->
                <div class="modal__body" id="ai-chat-setup">
                    <div class="settings-item">
                        <label class="settings-item__label" data-i18n="chatTitle">Название чата</label>
                        <input
                            type="text"
                            class="settings-item__input"
                            id="ai-chat-title"
                            data-i18n-placeholder="chatTitlePlaceholder"
                            placeholder="Необязательно..."
                        >
                    </div>
                    <div class="settings-item">
                        <label class="settings-item__label" data-i18n="selectCharacter">Персонаж</label>
                        <div class="language-selector">
                            <select class="language-selector__select" id="ai-chat-character"></select>
                            <i class="language-selector__icon" data-lucide="chevron-down"></i>
                        </div>
                    </div>
                    <div class="settings-item">
                        <label class="settings-item__label" data-i18n="selectModel">Модель</label>
                        <div class="language-selector">
                            <select class="language-selector__select" id="ai-chat-model"></select>
                            <i class="language-selector__icon" data-lucide="chevron-down"></i>
                        </div>
                        <p class="settings-item__caption" data-i18n="modelPriceHint">Цена: ввод / вывод за 1M токенов, USD</p>
                    </div>
                </div>
                <div class="modal__footer" id="ai-chat-footer">
                    <button class="modal__btn modal__btn--secondary" id="ai-chat-cancel" data-i18n="cancel">Отмена</button>
                    <button class="modal__btn modal__btn--primary" id="ai-chat-start" data-i18n="startChat">Начать чат</button>
                </div>
            </div>

            <input type="file" id="editor-file-input" accept=".ink,.txt" hidden>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settings-modal" hidden>
        <div class="modal__content modal__content--small">
            <div class="modal__header">
                <h2 class="modal__title" data-i18n="settings">Настройки</h2>
                <button class="modal__close" id="settings-close" aria-label="Close">
                    <i data-lucide="x"></i>
                </button>
            </div>

            <!-- Settings Tabs -->
            <div class="settings-tabs">
                <button class="settings-tabs__btn is-active" data-tab="general">
                    <i data-lucide="sliders-horizontal"></i>
                    <span data-i18n="settingsGeneral">Основные</span>
                </button>
                <button class="settings-tabs__btn" data-tab="api-keys">
                    <i data-lucide="key"></i>
                    <span data-i18n="settingsApiKeys">API Ключи</span>
                </button>
                <button class="settings-tabs__btn" data-tab="characters">
                    <i data-lucide="users"></i>
                    <span data-i18n="settingsCharacters">Персонажи</span>
                </button>
            </div>

            <div class="modal__body">
                <!-- Tab: General -->
                <div class="settings-tab-content is-active" id="settings-tab-general">
                    <!-- Theme Selector -->
                    <div class="settings-item">
                        <label class="settings-item__label" data-i18n="theme">Тема</label>
                        <div class="theme-selector">
                            <input type="radio" name="theme" id="theme-neutral" value="neutral" class="theme-selector__input">
                            <label for="theme-neutral" class="theme-selector__option">
                                <span class="theme-selector__icon">
                                    <i data-lucide="contrast"></i>
                                </span>
                                <span class="theme-selector__label" data-i18n="themeNeutral">Нейтральная</span>
                            </label>
                            <input type="radio" name="theme" id="theme-default" value="default" class="theme-selector__input">
                            <label for="theme-default" class="theme-selector__option">
                                <span class="theme-selector__icon">
                                    <i data-lucide="sun"></i>
                                </span>
                                <span class="theme-selector__label" data-i18n="themeDefault">Стандартная</span>
                            </label>
                            <input type="radio" name="theme" id="theme-low-contrast" value="low-contrast" class="theme-selector__input">
                            <label for="theme-low-contrast" class="theme-selector__option">
                                <span class="theme-selector__icon">
                                    <i data-lucide="moon"></i>
                                </span>
                                <span class="theme-selector__label" data-i18n="themeLowContrast">Низкий контраст</span>
                            </label>
                            <select id="settings-theme" hidden>
                                <option value="default">Default</option>
                                <option value="neutral">Neutral</option>
                                <option value="low-contrast">Low Contrast</option>
                            </select>
                        </div>
                    </div>

                    <!-- Typing Speed Sliders -->
                    <div class="settings-item">
                        <label class="settings-item__label" data-i18n="typingSpeed">Скорость печати</label>

                        <div class="slider-control">
                            <div class="slider-control__header">
                                <span class="slider-control__label" data-i18n="typingMin">Мин (мс)</span>
                                <span class="slider-control__value" id="typing-min-value">400</span>
                            </div>
                            <input
                                type="range"
                                class="slider-control__input"
                                id="settings-typing-min"
                                min="200"
                                max="2000"
                                step="100"
                                value="400"
                            >
                            <div class="slider-control__track">
                                <div class="slider-control__fill" id="typing-min-fill"></div>
                            </div>
                        </div>

                        <div class="slider-control">
                            <div class="slider-control__header">
                                <span class="slider-control__label" data-i18n="typingMax">Макс (мс)</span>
                                <span class="slider-control__value" id="typing-max-value">1600</span>
                            </div>
                            <input
                                type="range"
                                class="slider-control__input"
                                id="settings-typing-max"
                                min="400"
                                max="5000"
                                step="100"
                                value="1600"
                            >
                            <div class="slider-control__track">
                                <div class="slider-control__fill" id="typing-max-fill"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Language Selector -->
                    <div class="settings-item">
                        <label class="settings-item__label" data-i18n="language">Язык</label>
                        <div class="language-selector">
                            <select class="language-selector__select" id="settings-language">
                                <option value="ru">Русский</option>
                                <option value="en">English</option>
                            </select>
                            <i class="language-selector__icon" data-lucide="chevron-down"></i>
                        </div>
                    </div>

                    <!-- Clear Data Button -->
                    <div class="settings-item">
                        <button class="settings-item__btn settings-item__btn--danger" id="btn-clear-data" data-i18n="clearData">Очистить все данные</button>
                    </div>
                </div>

                <!-- Tab: API Keys -->
                <div class="settings-tab-content" id="settings-tab-api-keys">
                    <!-- OpenAI -->
                    <div class="settings-item">
                        <label class="settings-item__label" data-i18n="apiKeyOpenai">OpenAI</label>
                        <div class="api-key-field">
                            <input
                                type="password"
                                class="api-key-field__input"
                                id="api-key-openai"
                                data-i18n-placeholder="apiKeyPlaceholder"
                                placeholder="Вставьте API ключ..."
                                autocomplete="off"
                            >
                            <button class="api-key-field__toggle" data-target="api-key-openai" aria-label="Toggle visibility">
                                <i data-lucide="eye"></i>
                            </button>
                            <button class="api-key-field__clear" data-target="api-key-openai" aria-label="Clear">
                                <i data-lucide="x"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Grok -->
                    <div class="settings-item">
                        <label class="settings-item__label" data-i18n="apiKeyGrok">Grok (xAI)</label>
                        <div class="api-key-field">
                            <input
                                type="password"
                                class="api-key-field__input"
                                id="api-key-grok"
                                data-i18n-placeholder="apiKeyPlaceholder"
                                placeholder="Вставьте API ключ..."
                                autocomplete="off"
                            >
                            <button class="api-key-field__toggle" data-target="api-key-grok" aria-label="Toggle visibility">
                                <i data-lucide="eye"></i>
                            </button>
                            <button class="api-key-field__clear" data-target="api-key-grok" aria-label="Clear">
                                <i data-lucide="x"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Tab: Characters -->
                <div class="settings-tab-content" id="settings-tab-characters">
                    <div class="characters-list" id="characters-list">
                        <!-- Character items rendered by JS -->
                    </div>
                    <button class="settings-item__btn settings-item__btn--add" id="btn-add-character">
                        <i data-lucide="plus"></i>
                        <span data-i18n="addCharacter">Добавить персонажа</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div class="modal" id="confirm-modal" hidden>
        <div class="modal__content modal__content--small">
            <div class="modal__header">
                <h2 class="modal__title" id="confirm-title">Подтверждение</h2>
            </div>
            <div class="modal__body">
                <p id="confirm-message"></p>
            </div>
            <div class="modal__footer">
                <button class="modal__btn modal__btn--secondary" id="confirm-cancel" data-i18n="cancel">Отмена</button>
                <button class="modal__btn modal__btn--danger" id="confirm-ok" data-i18n="confirm">Подтвердить</button>
            </div>
        </div>
    </div>

    <!-- Model Picker Modal -->
    <div class="modal modal--overlay" id="model-picker-modal" hidden>
        <div class="modal__content modal__content--small">
            <div class="modal__header">
                <h2 class="modal__title" data-i18n="changeModel">Сменить модель</h2>
                <button class="modal__close" id="model-picker-close" aria-label="Close">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="modal__body">
                <div class="settings-item">
                    <div class="language-selector">
                        <select class="language-selector__select" id="model-picker-select"></select>
                        <i class="language-selector__icon" data-lucide="chevron-down"></i>
                    </div>
                </div>
            </div>
            <div class="modal__footer">
                <button class="modal__btn modal__btn--secondary" id="model-picker-cancel" data-i18n="cancel">Отмена</button>
                <button class="modal__btn modal__btn--primary" id="model-picker-apply" data-i18n="save">Сохранить</button>
            </div>
        </div>
    </div>

    <!-- Character Editor Modal -->
    <div class="modal modal--overlay" id="character-modal" hidden>
        <div class="modal__content modal__content--small">
            <div class="modal__header">
                <h2 class="modal__title" id="character-modal-title" data-i18n="addCharacter">Добавить персонажа</h2>
                <button class="modal__close" id="character-cancel" aria-label="Close">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="modal__body">
                <div class="character-editor">
                    <div class="settings-item">
                        <label class="settings-item__label" data-i18n="characterName">Имя</label>
                        <input
                            type="text"
                            class="settings-item__input"
                            id="character-name"
                            data-i18n-placeholder="characterNamePlaceholder"
                            placeholder="Имя персонажа..."
                        >
                    </div>
                    <div class="settings-item">
                        <label class="settings-item__label" data-i18n="characterPrompt">Системный промпт</label>
                        <textarea
                            class="character-editor__prompt"
                            id="character-prompt"
                            data-i18n-placeholder="characterPromptPlaceholder"
                            placeholder="Опишите характер и поведение персонажа..."
                        ></textarea>
                    </div>
                </div>
            </div>
            <div class="modal__footer">
                <button class="modal__btn modal__btn--secondary" id="character-modal-cancel" data-i18n="cancel">Отмена</button>
                <button class="modal__btn modal__btn--primary" id="character-save" data-i18n="saveCharacter">Сохранить</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
